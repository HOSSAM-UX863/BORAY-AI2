ددworkflows:
  android-workflow:
    name: Android Build
    environment:
      java: 17
    scripts:
      - name: Extract Project and Force Build
        script: |
          unzip -o "ai boray.zip"
          
          GRADLEW_DIR=$(find . -name "build.gradle.kts" -exec dirname {} \; | head -n 1)
          if [ -n "$GRADLEW_DIR" ]; then
            cd "$GRADLEW_DIR"
          fi
          
          # استبدال الإصدار التالف برمجياً عبر أداة البث المضمونة
          find . -type f \( -name "build.gradle.kts" -o -name "libs.versions.toml" \) -exec perl -pi -e 's/3.2.0/3.0.2/g' {} +
          
          gradle assembleDebug --no-daemon
    artifacts:
      - "**/build/outputs/**/*.apk"
