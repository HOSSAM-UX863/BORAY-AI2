workflows:
  android-workflow:
    name: Android Build

    environment:
      java: 17

    scripts:
      - name: Extract Project
        script: |
          unzip -o app.zip

      - name: Build APK
        script: |
          cd app
          chmod +x gradlew
          sed -i.bak 's/DEFAULT_JVM_OPTS=.*/DEFAULT_JVM_OPTS=""/' gradlew
          ./gradlew assembleDebug --no-daemon

    artifacts:
      - "app/**/build/outputs/**/*.apk"
