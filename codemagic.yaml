workflows:
  android-workflow:
    name: Android Build
    environment:
      java: 17
    scripts:
      - name: Build Application Natively
        script: |
          unzip -o "ai boray.zip"
          
          GRADLEW_DIR=$(find . -name "build.gradle.kts" -exec dirname {} \; | head -n 1)
          if [ -n "$GRADLEW_DIR" ]; then
            cd "$GRADLEW_DIR"
          fi
          
          gradle assembleDebug --no-daemon
    artifacts:
      - "**/build/outputs/**/*.apk"
