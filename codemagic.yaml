
workflows:
  android-workflow:
    name: Android Build
    environment:
      java: 17
    scripts:
      - name: Build Application
        script: |
          # الدخول للمجلد العربي وبناء التطبيق مباشرة
          cd "بورعي"
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - "بورعي/app/build/outputs/**/*.apk"
