workflows:
  android-workflow:
    name: Android Build
    environment:
      java: 17
    scripts:
      - name: Extract Project and Build
        script: |
          unzip "ai boray.zip"
          
          # الانتقال تلقائياً إلى المجلد المستخرج الذي يحتوي على ملف البناء
          GRADLEW_DIR=$(find . -name "gradlew" -exec dirname {} \; | head -n 1)
          if [ -n "$GRADLEW_DIR" ]; then
            cd "$GRADLEW_DIR"
          fi
          
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - "**/build/outputs/**/*.apk"
