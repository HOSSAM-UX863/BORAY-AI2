workflows:
  android-workflow:
    name: Android Build
    scripts:
      - name: Build with global gradle
        script: |
          # الدخول لمجلد المشروع وبنائه مباشرة عبر أداة النظام لتجنب السكربت التالف
          GRADLE_DIR=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
          if [ -n "$GRADLE_DIR" ]; then
            cd "$GRADLE_DIR"
          fi
          gradle assembleDebug
    artifacts:
      - "**/build/outputs/**/*.apk"
